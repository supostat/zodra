pre-commit:
  parallel: true
  commands:
    rubocop:
      glob: "*.rb"
      root: gem/
      run: bundle exec rubocop --parallel {staged_files}
    typecheck:
      glob: "*.{ts,tsx,js}"
      root: js/
      run: pnpm typecheck

pre-push:
  parallel: true
  commands:
    rspec:
      root: gem/
      run: bundle exec rspec
    vitest:
      root: js/
      run: pnpm test
