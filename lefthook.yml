pre-commit:
  parallel: true
  commands:
    rubocop:
      glob: "*.rb"
      root: gem/
      run: bundle exec rubocop --parallel {staged_files}
    typecheck-js:
      glob: "*.{ts,tsx,js}"
      root: js/
      run: pnpm typecheck
    typecheck-website:
      glob: "*.{ts,tsx,js,mjs}"
      root: website/
      run: npx tsc --noEmit

pre-push:
  parallel: true
  commands:
    rspec:
      root: gem/
      run: bundle exec rspec
    vitest:
      root: js/
      run: pnpm test
