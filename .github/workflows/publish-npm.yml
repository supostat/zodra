name: Publish npm

on:
  push:
    tags:
      - "client-v*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish @zodra/client to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: js/pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @zodra/client build
      - run: pnpm --filter @zodra/client typecheck
      - run: pnpm --filter zodra-vscode typecheck
      - run: pnpm --filter zodra-example-frontend typecheck
      - run: pnpm test

      - name: Publish
        run: pnpm --filter @zodra/client publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
